apiVersion: v1
kind: ConfigMap
metadata:
  name: soccerhub-config
  namespace: soccerhub
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  DB_PORT: "5432"
  DB_MAX_CONNECTIONS: "100"
  REDIS_PORT: "6379"
  APP_URL: "https://api.soccerhub.com"
  CORS_ORIGIN: "https://soccerhub.com"
  DB_HOST: "postgres-service"
  REDIS_HOST: "redis-service"
