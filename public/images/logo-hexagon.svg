<svg viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hexBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9FD356;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6BAE2F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7EC850;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5BA840;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="ballShine" cx="30%" cy="30%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5f5f5;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Hexagon outer border -->
  <polygon points="140,20 240,80 240,200 140,260 40,200 40,80" fill="none" stroke="#0a0a0a" stroke-width="8" stroke-linejoin="round"/>

  <!-- Hexagon main gradient fill -->
  <polygon points="140,28 236,84 236,196 140,252 44,196 44,84" fill="url(#hexBg)"/>

  <!-- Inner hexagon for depth -->
  <polygon points="140,35 230,84 230,196 140,245 50,196 50,84" fill="url(#skyGrad)"/>

  <!-- City Skyline -->
  <g fill="#000000" opacity="0.95">
    <!-- Building 1 (left short) -->
    <rect x="60" y="150" width="16" height="65" rx="1"/>
    <polygon points="60,150 68,130 76,150" fill="#000"/>

    <!-- Building 2 (left-mid) -->
    <rect x="82" y="160" width="14" height="55" rx="1"/>
    <polygon points="82,160 89,140 96,160" fill="#000"/>

    <!-- Building 3 (center tall - Empire State style) -->
    <rect x="124" y="90" width="22" height="125" rx="1"/>
    <polygon points="124,90 135,65 146,90" fill="#000"/>
    <!-- Building antenna/spire -->
    <rect x="132" y="55" width="6" height="40" fill="#000" opacity="0.8"/>

    <!-- Building 4 (right-mid) -->
    <rect x="158" y="155" width="16" height="60" rx="1"/>
    <polygon points="158,155 166,133 174,155" fill="#000"/>

    <!-- Building 5 (right short) -->
    <rect x="182" y="170" width="14" height="45" rx="1"/>
    <polygon points="182,170 189,152 196,170" fill="#000"/>

    <!-- Additional buildings for skyline depth -->
    <rect x="72" y="175" width="8" height="40" rx="0.5" opacity="0.7"/>
    <rect x="202" y="185" width="10" height="30" rx="0.5" opacity="0.7"/>
  </g>

  <!-- Soccer Ball - Main sphere -->
  <circle cx="140" cy="105" r="38" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Ball 3D shading -->
  <ellipse cx="140" cy="110" rx="36" ry="12" fill="#e8e8e8" opacity="0.6"/>

  <!-- Ball pentagon pattern - Black areas -->
  <g fill="#1a1a1a" opacity="0.9">
    <!-- Top pentagon -->
    <polygon points="140,75 152,82 148,98 132,98 128,82"/>
    <!-- Upper left pentagon -->
    <polygon points="112,92 118,108 132,115 128,99 120,93"/>
    <!-- Upper right pentagon -->
    <polygon points="168,92 160,93 172,99 186,115 180,108"/>
    <!-- Lower left pentagon -->
    <polygon points="115,125 127,135 127,152 113,147"/>
    <!-- Lower right pentagon -->
    <polygon points="165,125 167,147 153,152 165,135"/>
    <!-- Bottom pentagon -->
    <polygon points="128,148 152,148 150,162 130,162"/>
  </g>

  <!-- Ball shine/gloss -->
  <ellipse cx="120" cy="85" rx="12" ry="10" fill="url(#ballShine)"/>

  <!-- Field/Grass pattern at bottom -->
  <g stroke="#ffffff" stroke-width="1.2" opacity="0.75" fill="none" stroke-linecap="round">
    <!-- Center line -->
    <line x1="140" y1="155" x2="140" y2="190"/>
    <!-- Center circle -->
    <circle cx="140" cy="172" r="8" opacity="0.6"/>
    <!-- Left field markings -->
    <path d="M 85 180 L 95 195" stroke-width="1"/>
    <path d="M 100 180 L 110 195" stroke-width="1"/>
    <!-- Right field markings -->
    <path d="M 185 180 L 175 195" stroke-width="1"/>
    <path d="M 170 180 L 160 195" stroke-width="1"/>
    <!-- Field depth lines -->
    <path d="M 75 200 L 85 220" stroke-width="0.8" opacity="0.5"/>
    <path d="M 205 200 L 195 220" stroke-width="0.8" opacity="0.5"/>
  </g>
</svg>