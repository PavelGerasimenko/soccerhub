<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Hexagon background gradient -->
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7fd43d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5ab81e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4cd964;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34c759;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Hexagon outer border -->
  <polygon points="100,20 170,55 170,145 100,180 30,145 30,55" fill="url(#hexGrad)" stroke="#000" stroke-width="4"/>

  <!-- Sky gradient background -->
  <polygon points="100,30 160,60 160,140 100,170 40,140 40,60" fill="url(#skyGrad)"/>

  <!-- City skyline silhouette -->
  <g fill="#000">
    <!-- Left building -->
    <rect x="45" y="85" width="12" height="55"/>
    <polygon points="45,85 51,75 57,85"/>

    <!-- Left-middle building -->
    <rect x="60" y="95" width="14" height="45"/>
    <polygon points="60,95 67,80 74,95"/>

    <!-- Center tall building (Empire State style) -->
    <rect x="80" y="65" width="18" height="75"/>
    <polygon points="80,65 89,50 98,65"/>
    <rect x="85" y="55" width="8" height="15"/>

    <!-- Right-middle building -->
    <rect x="105" y="90" width="16" height="50"/>
    <polygon points="105,90 113,75 121,90"/>

    <!-- Right building -->
    <rect x="128" y="100" width="12" height="40"/>
    <polygon points="128,100 134,88 140,100"/>
  </g>

  <!-- Soccer ball -->
  <circle cx="100" cy="90" r="28" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <!-- Pentagon pattern on ball -->
  <g fill="#000" opacity="0.3">
    <circle cx="100" cy="75" r="4"/>
    <circle cx="115" cy="85" r="4"/>
    <circle cx="110" cy="100" r="4"/>
    <circle cx="90" cy="100" r="4"/>
    <circle cx="85" cy="85" r="4"/>
    <circle cx="100" cy="105" r="4"/>
  </g>

  <!-- Football field lines -->
  <g stroke="#fff" stroke-width="1.5" opacity="0.8">
    <!-- Center line -->
    <line x1="100" y1="130" x2="100" y2="155"/>
    <!-- Left field lines -->
    <line x1="50" y1="145" x2="70" y2="160"/>
    <line x1="70" y1="145" x2="85" y2="160"/>
    <!-- Right field lines -->
    <line x1="130" y1="145" x2="115" y2="160"/>
    <line x1="150" y1="145" x2="130" y2="160"/>
  </g>
</svg>